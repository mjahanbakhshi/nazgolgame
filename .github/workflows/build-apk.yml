name: Build APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle assembleDebug 2>&1 | tee build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-grid-game-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          if-no-files-found: ignore

      - name: Report build errors
        if: failure()
        run: |
          python3 - <<'PY'
          from pathlib import Path

          text = Path("build-log.txt").read_text(errors="replace")
          lines = [
              line for line in text.splitlines()
              if "error:" in line.lower()
              or "failed" in line.lower()
              or "failure" in line.lower()
          ]
          if not lines:
              lines = text.splitlines()[-20:]

          message = "\n".join(lines[-20:])
          message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Gradle build failed::{message}")
          PY
